<!DOCTYPE html>
<html>
<head>
  <title>SafeSurf Parent Login</title>
</head>
<style>

body{
    margin:0;
    font-family:Segoe UI, Arial;
    background: linear-gradient(135deg,#1f4037,#99f2c8);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    width:350px;
    padding:35px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#1f4037;
    margin-bottom:20px;
}

.logo span{
    color:#2ecc71;
}

.subtitle{
    color:#777;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ddd;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#2ecc71;
}

button{
    width:100%;
    padding:12px;
    background:#2ecc71;
    border:none;
    color:white;
    font-size:15px;
    border-radius:6px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#27ae60;
}

.link{
    margin-top:15px;
    font-size:13px;
}

.link a{
    color:#2ecc71;
    text-decoration:none;
}

.error{
    color:red;
    font-size:13px;
    margin-top:10px;
}

</style>
<body>


<form id="loginForm">
  <input id="email" type="email" placeholder="Email" required />
  <br><br>
  <input id="password" type="password" placeholder="Password" required />
  <br><br>
  <button type="submit">Login</button>
</form>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("https://safesurf-backend.onrender.com/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.access_token) {
    localStorage.setItem("jwt", data.access_token);
    window.location.href = "https://safesurf-backend.onrender.com/dashboard/index.html";

  } else {
    alert("Login failed");
  }
});
</script>


</body>
</html>
